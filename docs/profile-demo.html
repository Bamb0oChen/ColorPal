<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ColorPal 个人主页</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, "PingFang SC", sans-serif; background: #FFFAF7; }
.page { max-width: 900px; margin: 0 auto; padding: 24px 16px 48px; min-height: 100vh; }

/* 头部 */
.header { display: flex; gap: 20px; align-items: center; background: white; border-radius: 16px; padding: 24px; box-shadow: 0 2px 12px rgba(0,0,0,0.06); margin-bottom: 16px; }
.avatar-wrap { flex-shrink: 0; position: relative; }
.avatar-wrap img { width: 80px; height: 80px; border-radius: 50%; border: 3px solid #FF7E67; display: block; }
.lv-badge { position: absolute; bottom: -4px; right: -6px; background: #A29BFE; color: white; font-size: 12px; font-weight: 700; padding: 2px 8px; border-radius: 10px; white-space: nowrap; }
.info { flex: 1; min-width: 0; }
.nickname { font-size: 22px; font-weight: 700; color: #2D3436; }
.bio { font-size: 13px; color: #636E72; margin: 2px 0 12px; }
.stats { display: flex; gap: 16px; }
.stat { text-align: center; }
.stat-val { font-size: 18px; font-weight: 700; color: #2D3436; }
.stat-lbl { font-size: 11px; color: #B2BEC3; }

/* 进度条 */
.progress-box { background: white; border-radius: 12px; padding: 16px 20px; box-shadow: 0 2px 12px rgba(0,0,0,0.06); margin-bottom: 16px; }
.progress-hd { display: flex; justify-content: space-between; font-size: 13px; color: #636E72; margin-bottom: 8px; }
.progress-hd .num { font-weight: 600; color: #FF7E67; }
.track { height: 8px; background: #F0F0F0; border-radius: 4px; overflow: hidden; }
.fill { height: 100%; background: linear-gradient(90deg, #FF7E67, #FFD700); border-radius: 4px; width: 50%; transition: width .5s; }

/* 成就 */
.achv-section { margin-bottom: 16px; }
.achv-hd { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
.achv-hd h2 { font-size: 17px; font-weight: 600; color: #2D3436; }
.achv-hd .count { font-size: 12px; color: #B2BEC3; }
.achv-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 10px; }
.achv-card { display: flex; align-items: center; gap: 12px; background: white; border-radius: 12px; padding: 14px 16px; box-shadow: 0 2px 8px rgba(0,0,0,0.04); opacity: .7; transition: all .2s; }
.achv-card.unlocked { opacity: 1; box-shadow: 0 2px 12px rgba(0,0,0,0.08); }
.achv-icon { width: 40px; height: 40px; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 20px; flex-shrink: 0; }
.achv-body { flex: 1; min-width: 0; }
.achv-name { font-size: 14px; font-weight: 600; color: #2D3436; }
.achv-desc { font-size: 11px; color: #B2BEC3; margin-top: 1px; }
.achv-check { color: #00B894; font-weight: 700; font-size: 18px; flex-shrink: 0; }
.achv-progress { color: #B2BEC3; font-size: 12px; flex-shrink: 0; }

/* 设置 */
.settings h2 { font-size: 17px; font-weight: 600; color: #2D3436; margin: 0 0 12px; }
.settings-list { background: white; border-radius: 12px; box-shadow: 0 2px 12px rgba(0,0,0,0.06); overflow: hidden; }
.setting { display: flex; align-items: center; gap: 12px; padding: 16px 20px; cursor: pointer; border-bottom: 1px solid #F0F0F0; transition: background .15s; }
.setting:last-child { border-bottom: none; }
.setting:hover { background: #FFF5F0; }
.setting .icon { font-size: 18px; width: 24px; text-align: center; }
.setting .label { flex: 1; font-size: 14px; color: #2D3436; }
.setting .arrow { color: #B2BEC3; font-size: 20px; }

/* 响应式 */
@media (max-width: 600px) {
  .page { padding: 16px 12px 32px; }
  .header { flex-direction: column; text-align: center; padding: 20px 16px; }
  .stats { justify-content: center; }
  .achv-grid { grid-template-columns: 1fr; }
}
@media (min-width: 900px) {
  .achv-grid { grid-template-columns: repeat(2, 1fr); }
}
</style>
</head>
<body>
<div class="page" id="app">
  <!-- 头部 -->
  <div class="header">
    <div class="avatar-wrap">
      <img id="avatarImg" src="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ccircle cx='50' cy='50' r='48' fill='%23FF7E67'/%3E%3Ccircle cx='50' cy='38' r='18' fill='white'/%3E%3Cellipse cx='50' cy='72' rx='26' ry='22' fill='white'/%3E%3Ccircle cx='42' cy='35' r='3' fill='%232D3436'/%3E%3Ccircle cx='58' cy='35' r='3' fill='%232D3436'/%3E%3Cpath d='M 46 42 Q 50 46 54 42' stroke='%232D3436' stroke-width='2' fill='none' stroke-linecap='round'/%3E%3C/svg%3E" alt="avatar" />
      <div class="lv-badge">Lv.5</div>
    </div>
    <div class="info">
      <div class="nickname">色彩猎人</div>
      <div class="bio">用色彩记录世界</div>
      <div class="stats">
        <div class="stat"><div class="stat-val">128</div><div class="stat-lbl">拍摄</div></div>
        <div class="stat"><div class="stat-val">95</div><div class="stat-lbl">最高分</div></div>
        <div class="stat"><div class="stat-val">18</div><div class="stat-lbl">已收集</div></div>
        <div class="stat"><div class="stat-val">7</div><div class="stat-lbl">成就</div></div>
      </div>
    </div>
  </div>

  <!-- 进度条 -->
  <div class="progress-box">
    <div class="progress-hd"><span>色彩收集进度</span><span class="num">18/36</span></div>
    <div class="track"><div class="fill"></div></div>
  </div>

  <!-- 成就 -->
  <div class="achv-section">
    <div class="achv-hd"><h2>🏆 成就</h2><span class="count">已完成 1/17</span></div>
    <div class="achv-grid" id="achvGrid"></div>
  </div>

  <!-- 设置 -->
  <div class="settings">
    <h2>⚙️ 设置</h2>
    <div class="settings-list">
      <div class="setting"><span class="icon">🎨</span><span class="label">我的精灵</span><span class="arrow">›</span></div>
      <div class="setting"><span class="icon">📷</span><span class="label">我的照片</span><span class="arrow">›</span></div>
      <div class="setting"><span class="icon">🗺️</span><span class="label">色彩足迹</span><span class="arrow">›</span></div>
      <div class="setting"><span class="icon">🔔</span><span class="label">通知设置</span><span class="arrow">›</span></div>
      <div class="setting"><span class="icon">📖</span><span class="label">使用指南</span><span class="arrow">›</span></div>
      <div class="setting"><span class="icon">ℹ️</span><span class="label">关于</span><span class="arrow">›</span></div>
    </div>
  </div>
</div>

<script>
const achievements = [
  { icon: '🔴', name: '红色狂热', desc: '集齐全部6种红色系颜色', color: '#FF0000', p: 3, t: 6, ok: false },
  { icon: '🟠', name: '橙色收集家', desc: '集齐全部4种橙色系颜色', color: '#FFA500', p: 4, t: 4, ok: true },
  { icon: '🟡', name: '黄色猎人', desc: '集齐全部5种黄色系颜色', color: '#FFD700', p: 2, t: 5, ok: false },
  { icon: '🟢', name: '绿色守护者', desc: '集齐全部6种绿色系颜色', color: '#7CFC00', p: 1, t: 6, ok: false },
  { icon: '🔵', name: '蓝色梦想家', desc: '集齐全部6种蓝色系颜色', color: '#87CEEB', p: 5, t: 6, ok: false },
  { icon: '🟣', name: '紫色神秘', desc: '集齐全部5种紫色系颜色', color: '#8F00FF', p: 0, t: 5, ok: false },
  { icon: '⚪', name: '无彩大师', desc: '集齐全部4种无彩色', color: '#B2BEC3', p: 1, t: 4, ok: false },
  { icon: '🌈', name: '全色谱大师', desc: '集齐全部36种颜色', color: '#FFD700', p: 18, t: 36, ok: false },
  { icon: '⭐', name: '新手猎色', desc: '累计收集18种常见颜色', color: '#FFD700', p: 12, t: 18, ok: false },
  { icon: '✨', name: '稀有发现者', desc: '累计收集11种稀有颜色', color: '#74B9FF', p: 4, t: 11, ok: false },
  { icon: '💎', name: '史诗猎手', desc: '累计收集5种史诗颜色', color: '#A29BFE', p: 2, t: 5, ok: false },
  { icon: '👑', name: '传说之眼', desc: '累计收集2种传说颜色', color: '#FFD700', p: 0, t: 2, ok: false },
  { icon: '🎨', name: '三原色', desc: '集齐正红+明黄+天蓝', color: '#00B894', p: 2, t: 3, ok: false },
  { icon: '🌈', name: '彩虹之路', desc: '集齐红橙黄绿蓝靛紫7色', color: '#00B894', p: 4, t: 7, ok: false },
  { icon: '🔥', name: '冷暖对决', desc: '拥有5种暖色+5种冷色', color: '#00B894', p: 6, t: 10, ok: false },
  { icon: '⚫', name: '黑白之间', desc: '集齐黑+白+银', color: '#00B894', p: 1, t: 3, ok: false },
  { icon: '🌅', name: '黄金时刻', desc: '日落时收集金色或橙色', color: '#74B9FF', p: 0, t: 1, ok: false },
]

const grid = document.getElementById('achvGrid')
const done = achievements.filter(a => a.ok).length
document.querySelector('.count').textContent = `已完成 ${done}/${achievements.length}`

achievements.forEach(a => {
  const card = document.createElement('div')
  card.className = 'achv-card' + (a.ok ? ' unlocked' : '')
  card.innerHTML = `
    <div class="achv-icon" style="background:${a.color}22;color:${a.color}">${a.icon}</div>
    <div class="achv-body">
      <div class="achv-name">${a.name}</div>
      <div class="achv-desc">${a.desc}</div>
    </div>
    ${a.ok ? '<div class="achv-check">✓</div>' : `<div class="achv-progress">${a.p}/${a.t}</div>`}
  `
  grid.appendChild(card)
})
</script>
</body>
</html>
